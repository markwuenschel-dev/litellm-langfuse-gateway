# Optional Redis *service* overlay only.
#
# Starts a Redis container next to the gateway stack. It does **not** configure
# LiteLLM for shared Router state, virtual-key RPM/TPM, response caching, or
# multi-replica control plane on the current pin (v1.92.0 silently falls back to
# process-local limits if Redis control state is wired — see
# docs/evidence/spikes/2026-07-19-int-001-redis-pin-compat.md).
#
# From this directory:
#   docker compose -f compose.yaml -f compose.redis.yaml up -d
#
# From repo root (thin shims):
#   docker compose -f docker-compose.yml -f docker-compose.redis.yml up -d
#
# CLI: `uv run llg up --redis-service` (no shared-limit claim).
# Set REDIS_PASSWORD in .env for the Redis container itself.
# Prefer host/port/password over a single redis_url if a future fail-closed
# shared-state topology is approved separately.

services:
  redis:
    # Pin: redis 7.4.9-alpine multi-arch index (2026-07-17)
    # Bump: see upgrade-notes.md
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env when enabling Redis}",
        "--appendonly",
        "yes",
      ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    # redis-cli reads REDISCLI_AUTH; password must not appear on argv (no -a / ps).
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env when enabling Redis}
    healthcheck:
      # Auth via REDISCLI_AUTH only — never redis-cli -a (argv-visible).
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gateway

  # Bring Redis up with the project; do not inject REDIS_* into LiteLLM and do
  # not claim shared routing / virtual-key limits from this overlay alone.
  litellm:
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
