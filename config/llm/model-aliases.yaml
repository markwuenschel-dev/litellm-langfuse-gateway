# Application-facing stable model alias contract (WP6 + WP7).
#
# Authority chain (ADR 0006 / INT-002 / INT-117):
#   1. This file is the semantic *write* SoT — keys under aliases: are the
#      full registry (app + optional internal). Equality with model_list is required.
#   2. infra/llm-gateway/litellm-config.yaml is the runtime model_list SoT
#      (must expose every registry name with matching litellm_model + env key;
#      must not list undeclared model_name values).
#   3. load_stable_aliases() = app-facing subset (registry_role app, default).
#   4. Admin UI / DB model edits are NOT production alias authority.
#   5. There is no third hardcoded STABLE_ALIASES list.
#   6. No arbitrary runtime-only routes: declare internal routes here with
#      registry_role: internal + exemption_rationale (never as model_list orphans).
#
# Rules:
#   - Only aliases with consumers (see consumers below). Do not invent unused names.
#   - registry_role: app (default) | internal (requires exemption_rationale).
#   - api_key_env is an env var name only — never put raw secrets here or in litellm-config.
#   - Fallback groups are off by default (no ordered multi-provider failover yet).
#   - Changing an alias→provider mapping requires: reason, eval, cost/latency,
#     tools/structured check, rollback mapping, and a release note.
#
# Model IDs are conservative, widely-available IDs as of scaffold time.
# Verify at image-pin / smoke time — see docs/llm-platform/provider-onboarding.md.

aliases:
  llm-general:
    description: Default chat for apps, examples, README smoke, and reference workflows
    litellm_model: openai/gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    consumers:
      - examples
      - readme-smoke
      - reference-workflow

  openai-general:
    description: Explicit OpenAI route for provider smokes and deliberate A/B
    litellm_model: openai/gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    consumers:
      - provider-smoke

  anthropic-general:
    description: Explicit Anthropic route for provider smokes (cheap/fast lean)
    litellm_model: anthropic/claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    consumers:
      - provider-smoke

  gemini-general:
    description: Explicit Google Gemini route for provider smokes
    litellm_model: gemini/gemini-3.5-flash
    api_key_env: GEMINI_API_KEY
    consumers:
      - provider-smoke

  grok-general:
    description: Explicit xAI / Grok route for provider smokes (cheap/fast lean)
    litellm_model: xai/grok-3-mini
    api_key_env: XAI_API_KEY
    consumers:
      - provider-smoke

