# Non-secret environment contract — production
# Secrets (keys, passwords, salt) live in a secret manager only — never in git.
# LITELLM_SALT_KEY: permanent; escrow offline; see incident-recovery.md
# See: infra/llm-gateway/.env.example, docs/llm-platform/incident-recovery.md

environment: production

# Model registry authority remains YAML (infra/llm-gateway/litellm-config.yaml)
store_model_in_db: false

litellm_mode: PRODUCTION
log_level: INFO
json_logs: true
set_verbose: false

# Timeouts (seconds) — tune per SLO; default matches LiteLLM prod guidance baseline
request_timeout: 600
health_timeout: 10

# Historical contract flag (unbound by runtime). Redis *service* may be ops-side;
# shared LiteLLM control-state is NOT claimed on the current pin (INT-001).
redis_required: true

postgres_required: true

langfuse:
  backend: cloud
  required_for_llm_path: false

admin_ui:
  public: false
  note: "Not public without SSO and network control; prefer private admin path"

# Ops expectations (non-secret flags for deploy checklists)
ops:
  pinned_images_required: true
  salt_offline_backup_required: true
  postgres_backup_required: true
  # Prefer host/port/password for Redis (not sole redis_url) when multi-replica
  redis_prefer_host_port_password: true
  # Scale pods with num_workers=1 (compose/k8s); do not raise workers for concurrency
  num_workers: 1
  # LiteLLM DB write batching (when pin supports proxy_batch_write_at): start at 60s
  # under load; keep lower/default until spend write latency is measured live.
  proxy_batch_write_at_seconds: 60
  proxy_batch_write_note: >
    Guidance only until enabled in litellm-config for a measured production pin.
    See infra/llm-gateway/upgrade-notes.md and docs/llm-platform/operating-guide.md.
