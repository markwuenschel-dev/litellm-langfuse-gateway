name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Hermetic dependency vulnerability audit (INT-112). No secrets beyond GITHUB_TOKEN.
  # Blocking: local pip-audit + pnpm audit --audit-level high were clean at introduction.
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Python dependency audit (uv.lock via export + pip-audit)
        run: |
          set -euo pipefail
          uv export --frozen --all-extras --no-emit-project -o /tmp/llg-requirements.txt
          # CI-only tool; not a project dep (keeps lock lean)
          uvx pip-audit -r /tmp/llg-requirements.txt

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version from package.json "packageManager"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node deps (for audit graph)
        run: pnpm install --frozen-lockfile

      - name: Node dependency audit (high+)
        run: pnpm audit --audit-level high

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (all extras, locked)
        run: uv sync --all-extras --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format (check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Validate LiteLLM config
        run: uv run python -m scripts.validate_config

      - name: Pytest
        run: uv run pytest

  node:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" only (avoid dual pin conflict)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce image digest pins
        run: |
          set -euo pipefail
          # Every compose file that ships image: lines (not overlays-only like compose.staging.yaml)
          files=(
            infra/llm-gateway/compose.yaml
            infra/llm-gateway/compose.redis.yaml
            tests/runtime_pin/compose/compose.pin-spike.yaml
          )
          rc=0
          for f in "${files[@]}"; do
            echo "Checking image pins in $f"
            found=0
            while IFS= read -r line || [[ -n "$line" ]]; do
              # strip leading whitespace for comment / key detection
              trimmed="${line#"${line%%[![:space:]]*}"}"
              [[ -z "$trimmed" || "$trimmed" == \#* ]] && continue
              [[ "$trimmed" == image:* ]] || continue
              found=1
              if ! grep -qE '@sha256:[0-9a-f]{64}' <<<"$line"; then
                echo "::error file=$f::image line missing @sha256 digest: $line"
                rc=1
              fi
              # floating tags without digest are forbidden
              if grep -qE ':(latest|main|main-stable)([[:space:]]|$|")' <<<"$line" \
                && ! grep -qE '@sha256:[0-9a-f]{64}' <<<"$line"; then
                echo "::error file=$f::floating tag without digest: $line"
                rc=1
              fi
            done <"$f"
            if [[ "$found" -eq 0 ]]; then
              echo "::error file=$f::no image: lines found"
              rc=1
            fi
          done
          exit "$rc"

      - name: Validate canonical gateway compose
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          DATABASE_URL: postgresql://litellm:ci-postgres-password@postgres:5432/litellm
        run: docker compose -f infra/llm-gateway/compose.yaml config --quiet

      - name: Validate canonical compose with Redis overlay
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          DATABASE_URL: postgresql://litellm:ci-postgres-password@postgres:5432/litellm
          REDIS_PASSWORD: ci-redis-password
        run: >
          docker compose
          -f infra/llm-gateway/compose.yaml
          -f infra/llm-gateway/compose.redis.yaml
          config --quiet

      - name: Validate staging overlay
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          DATABASE_URL: postgresql://litellm:ci-postgres-password@postgres:5432/litellm
        run: >
          docker compose
          -f infra/llm-gateway/compose.yaml
          -f infra/llm-gateway/compose.staging.yaml
          config --quiet

      - name: Validate staging + Redis overlay
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          DATABASE_URL: postgresql://litellm:ci-postgres-password@postgres:5432/litellm
          REDIS_PASSWORD: ci-redis-password
        run: >
          docker compose
          -f infra/llm-gateway/compose.yaml
          -f infra/llm-gateway/compose.redis.yaml
          -f infra/llm-gateway/compose.staging.yaml
          config --quiet

      - name: Validate root compose shims
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          DATABASE_URL: postgresql://litellm:ci-postgres-password@postgres:5432/litellm
          REDIS_PASSWORD: ci-redis-password
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.redis.yml config --quiet

      - name: Install uv (for env-origin regression)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Prove include env origin (gateway .env, not root)
        run: |
          uv sync --all-extras --frozen
          uv run pytest tests/integration/test_compose_env_origin.py -v --tb=short
