name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (all extras, locked)
        run: uv sync --all-extras --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format (check)
        run: uv run ruff format --check .

      - name: Validate LiteLLM config
        run: uv run python -m scripts.validate_config

      - name: Pytest
        run: uv run pytest

  node:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canonical gateway compose
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
        run: docker compose -f infra/llm-gateway/compose.yaml config --quiet

      - name: Validate canonical compose with Redis overlay
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
        run: >
          docker compose
          -f infra/llm-gateway/compose.yaml
          -f infra/llm-gateway/compose.redis.yaml
          config --quiet

      - name: Validate root compose shims
        env:
          LITELLM_MASTER_KEY: sk-ci-master-not-real
          LITELLM_SALT_KEY: sk-ci-salt-not-real
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.redis.yml config --quiet
